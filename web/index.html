<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chess Web Local</title>
  <style>
    :root {
      --panel: #1f2735;
      --panel-border: #4c5d79;
      --text: #ecf1fb;
      --muted: #b9c5da;
      --light-square: #d2b896;
      --dark-square: #8f6f55;
      --frame: #61605e;
      --accent: #c99600;
      --danger: #db2f2f;
      --btn: #3e4b64;
      --btn-hover: #50607f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      background: #000;
      overflow: hidden;
    }

    .app-shell {
      max-width: 1400px;
      margin: 0 auto;
      height: 100dvh;
      padding: clamp(8px, 1.3vw, 16px);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: clamp(12px, 2vw, 22px);
      align-items: stretch;
      height: 100%;
    }

    .board-section {
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .board-card {
      position: relative;
      width: min(100%, calc(100dvh - 26px));
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
      margin: 0;
      border-radius: 18px;
      overflow: hidden;
      border: 0;
      box-shadow: none;
      background: #000;
    }

    #board-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }

    #board-canvas.dragging {
      cursor: grabbing;
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .card {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      background: linear-gradient(160deg, #273246, #1b2432);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 17px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #e6edfa;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(160, 179, 211, 0.18);
      font-size: 14px;
    }

    .meta-row:last-child {
      border-bottom: 0;
      align-items: start;
    }

    .meta-row span {
      color: var(--muted);
    }

    #fen-indicator {
      display: inline-block;
      max-width: 210px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      color: #d4def3;
      user-select: all;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .controls button {
      border: 0;
      border-radius: 10px;
      padding: 10px 8px;
      font: inherit;
      font-weight: 600;
      color: var(--text);
      background: linear-gradient(165deg, var(--btn), #344057);
      transition: transform 120ms ease, background-color 120ms ease;
    }

    .controls button:hover {
      background: linear-gradient(165deg, var(--btn-hover), #405072);
      transform: translateY(-1px);
    }

    .controls button:active {
      transform: translateY(0);
    }

    .move-list {
      max-height: none;
      min-height: 0;
      height: 100%;
      overflow: auto;
      padding-right: 4px;
      font-family: "Menlo", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #dbe5f9;
    }

    .sidebar .card:last-child {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .move-row {
      display: grid;
      grid-template-columns: 34px 1fr 1fr;
      gap: 8px;
      padding: 2px 0;
    }

    .move-row span:first-child {
      color: #9eb0d3;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app-shell {
        height: auto;
        min-height: 100dvh;
        padding: 8px;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        height: auto;
        gap: 10px;
      }

      .board-card {
        width: min(100%, 72dvh);
        margin: 0 auto;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      #fen-indicator {
        max-width: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="layout">
      <section class="board-section">
        <div class="board-card">
          <canvas id="board-canvas" aria-label="Chess board"></canvas>
        </div>
      </section>

      <aside class="sidebar">
        <section class="card">
          <div class="meta-row">
            <span>White Clock</span>
            <strong id="clock-white">10:00</strong>
          </div>
          <div class="meta-row">
            <span>Black Clock</span>
            <strong id="clock-black">10:00</strong>
          </div>
          <div class="meta-row">
            <span>Turn</span>
            <strong id="turn-indicator">White</strong>
          </div>
          <div class="meta-row">
            <span>Status</span>
            <strong id="status-indicator">In progress</strong>
          </div>
          <div class="meta-row">
            <span>FEN</span>
            <code id="fen-indicator"></code>
          </div>
        </section>

        <section class="card controls">
          <button id="btn-new" type="button">New Game</button>
          <button id="btn-undo" type="button">Undo</button>
          <button id="btn-flip" type="button">Flip Board</button>
          <button id="btn-copy-fen" type="button">Copy FEN</button>
        </section>

        <section class="card">
          <h2>Move List</h2>
          <div id="move-list" class="move-list" role="log" aria-live="polite"></div>
        </section>
      </aside>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
